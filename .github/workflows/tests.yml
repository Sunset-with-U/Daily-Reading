# 单测门禁：push / PR 全量跑测试（全部离线 fixture，不出网、不装 GUI 依赖）
name: tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装依赖
        run: pip install -r requirements-dev.txt

      - name: 运行单测
        run: python -m pytest -q
