# 桌面 App 发布通道：在 macOS runner 上用 Briefcase 打出 .app/.dmg。
#
# 两种用法：
#   1) Actions 页手动 Run workflow——publish_tag 留空只出构建产物（Artifacts）；
#      填版本号（如 v2.2.0）则同时创建正式 GitHub Release 并把 .dmg 挂上去，
#      所有人都能在 Releases 页直接下载。
#   2) 推送 v* 标签——效果等同于填了 publish_tag。
#
# 无签名证书时用 ad-hoc 签名（用户首次右键打开即可），
# 接入 Developer ID 签名/公证的步骤见 docs/PACKAGING.md。
name: release

on:
  workflow_dispatch:
    inputs:
      publish_tag:
        description: "发布正式版：填版本标签（如 v2.2.0）则创建 Release 挂 .dmg；留空只出构建产物"
        type: string
        default: ""
  push:
    tags: ["v*"]

permissions:
  contents: write   # 创建 Release / 标签

jobs:
  build-macos:
    runs-on: macos-14   # Apple Silicon；与 pyproject universal_build=false 匹配
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装 Briefcase
        run: python -m pip install --upgrade pip briefcase

      - name: 预构建 sdist-only 依赖的 wheel
        # briefcase 按目标平台只装 wheel，而 pywebview 的依赖 proxy_tools
        # 在 PyPI 上只有 sdist——先本地构建纯 Python wheel，经 PIP_FIND_LINKS 提供
        run: |
          python -m pip wheel proxy_tools --wheel-dir "$GITHUB_WORKSPACE/wheels"
          echo "PIP_FIND_LINKS=$GITHUB_WORKSPACE/wheels" >> "$GITHUB_ENV"

      - name: 生成应用骨架（briefcase create）
        run: briefcase create macOS

      - name: 构建 .app（briefcase build）
        run: briefcase build macOS

      - name: 打包 .dmg（ad-hoc 签名）
        run: briefcase package macOS --adhoc-sign

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Daily-Reading-macOS
          path: dist/*.dmg
          if-no-files-found: error

      - name: 创建正式 GitHub Release（填了 publish_tag 或推了 v* 标签）
        if: inputs.publish_tag != '' || startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.publish_tag || github.ref_name }}
        run: |
          # 已存在同名 Release 时只补挂产物（幂等，可安全重跑）
          gh release create "$TAG" dist/*.dmg \
            --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" \
            --title "Daily Reading $TAG" --generate-notes --latest \
          || gh release upload "$TAG" dist/*.dmg --repo "$GITHUB_REPOSITORY" --clobber
