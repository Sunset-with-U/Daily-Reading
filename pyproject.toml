# ============================================================
# Briefcase 打包配置（仅桌面 App 使用）
# 云端 CI（daily.yml / health.yml）只装 requirements.txt，不读本文件。
# 打包与发布流程见 docs/PACKAGING.md。
# ============================================================

[tool.briefcase]
project_name = "Daily Reading"
bundle = "io.github.sunset-with-u"
version = "2.2.0"        # 与 app/server.py 的 AppState.version 保持一致
license = "MIT"
license-files = ["LICENSE"]
author = "Sunset-with-U"
author_email = "sunset-with-u@users.noreply.github.com"

[tool.briefcase.app.daily-reading]
formal_name = "Daily Reading"
description = "每日宏观与市场情报早晚报：抓取百余信息源，AI 逐条分析并生成深度报告"
# daily_reading 是 Briefcase 入口 shim（转调 app/main.py）；
# site/ 与 config/ 以数据目录原样进包——app/paths.py 的 bundled_root() 依赖此布局
sources = ["daily_reading", "app", "pipeline", "site", "config"]
icon = "app/resources/daily-reading"
requires = [
    # 与 requirements.txt 同步（Briefcase 不读 requirements 文件）
    "httpx>=0.27",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
    "PyYAML>=6.0",
    "python-dateutil>=2.9",
    "anthropic>=0.116",
    "pandas>=2.2",
    "openpyxl>=3.1",
    "yfinance>=0.2.50",
    # 桌面层（requirements-app.txt）；注意 pywebview 依赖的 proxy_tools 只有
    # sdist——打包前需自建 wheel 并设 PIP_FIND_LINKS（见 docs/PACKAGING.md）
    "keyring>=25.0",
    "pywebview>=5.0",
]

[tool.briefcase.app.daily-reading.macOS]
# Apple Silicon 单架构：pandas/numpy/lxml 不发 universal2 轮子，universal 构建必失败；
# Intel Mac 用户可在本机用同样命令打 x86_64 包（见 docs/PACKAGING.md）
universal_build = false
requires = [
    # 菜单栏（AppKit/AppHelper）与 WKWebView 显式声明，不依赖 pywebview 间接拉取
    "pyobjc-framework-Cocoa",
    "pyobjc-framework-WebKit",
]
# WKWebView 加载 http://127.0.0.1 需放行本机回环（ATS 只约束 WebView，不影响 httpx 出网）
info."NSAppTransportSecurity" = { NSAllowsLocalNetworking = true }
# 沙盒网络 entitlements 先备好（对 ad-hoc 签名无害）；
# 上架 Mac App Store 时再开 app-sandbox，清单见 docs/PACKAGING.md
entitlement."com.apple.security.network.client" = true
entitlement."com.apple.security.network.server" = true
